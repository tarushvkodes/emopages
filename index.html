<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Face + Hand Tracker</title>
    <style>
      :root {
        --bg: #050505;
        --fg: #ffffff;
        --box: #33ff44;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: Arial, Helvetica, sans-serif;
        display: grid;
        place-items: center;
      }

      .app {
        width: min(100vw, 980px);
        padding: 12px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .toolbar-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .status {
        font-size: 0.95rem;
        opacity: 0.9;
      }

      button {
        border: 0;
        background: #111;
        color: #fff;
        border: 1px solid #444;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
      }

      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
      }

      video,
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      video {
        transform: scaleX(-1);
      }

      canvas {
        transform: scaleX(-1);
      }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script type="module">
      import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

      const statusEl = () => document.getElementById("status");
      const video = document.getElementById("webcam");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d", { alpha: true, willReadFrequently: false });

      const FACE_MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/";
      const HAND_MODEL_URL =
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";

      let handLandmarker = null;
      let videoReady = false;
      let processing = false;
      let rafId = null;
      let faceTracks = [];
      let handTracks = [];
      let nextFaceId = 1;
      let nextHandId = 1;
      let lastFaceAt = 0;
      let lastFaceAttrAt = 0;
      let lastHandAt = 0;
      let cachedFaces = [];
      let cachedHands = [];
      let perfProfile = null;
      let faceDetectorOptions = null;
      let maxFaces = 8;
      let faceInferenceRunning = false;
      let handInferenceRunning = false;

      function setStatus(msg) {
        statusEl().textContent = msg;
      }

      function isPreviewFullscreen() {
        return Boolean(document.fullscreenElement || document.webkitFullscreenElement);
      }

      function updateFullscreenButtonLabel() {
        const btn = document.getElementById("fullscreenBtn");
        if (!btn) return;
        btn.textContent = isPreviewFullscreen() ? "Exit Fullscreen" : "Fullscreen";
      }

      async function toggleFullscreenPreview() {
        const stage = document.getElementById("previewStage");
        try {
          if (isPreviewFullscreen()) {
            if (document.exitFullscreen) {
              await document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
              document.webkitExitFullscreen();
            }
          } else if (stage.requestFullscreen) {
            await stage.requestFullscreen();
          } else if (stage.webkitRequestFullscreen) {
            stage.webkitRequestFullscreen();
          } else {
            setStatus("Fullscreen is not supported in this browser.");
          }
        } catch (err) {
          console.error("Fullscreen toggle failed:", err);
          setStatus("Unable to toggle fullscreen.");
        }
      }

      function buildPerformanceProfile() {
        const ua = navigator.userAgent.toLowerCase();
        const cores = navigator.hardwareConcurrency || 4;
        const mem = navigator.deviceMemory || 4;
        const isiPad = /ipad/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const lowPower = /jetson|armv7|aarch64/.test(ua) || cores <= 4 || mem <= 4;
        const highPower = cores >= 10 && mem >= 8;

        if (lowPower) {
          return {
            name: "low-power",
            cameraWidth: 640,
            cameraHeight: 480,
            cameraFps: 30,
            faceIntervalMs: 220,
            faceAttrIntervalMs: 1400,
            handIntervalMs: 180,
            faceInputSize: 224,
            faceScoreThreshold: 0.5,
            maxFaces: 6,
            maxHands: 2,
            compactLabels: true
          };
        }
        if (isiPad || highPower) {
          return {
            name: "high-performance",
            cameraWidth: 1280,
            cameraHeight: 720,
            cameraFps: 60,
            faceIntervalMs: 120,
            faceAttrIntervalMs: 800,
            handIntervalMs: 100,
            faceInputSize: 320,
            faceScoreThreshold: 0.45,
            maxFaces: 12,
            maxHands: 4,
            compactLabels: false
          };
        }
        return {
          name: "balanced",
          cameraWidth: 960,
          cameraHeight: 540,
          cameraFps: 60,
          faceIntervalMs: 150,
          faceAttrIntervalMs: 1000,
          handIntervalMs: 130,
          faceInputSize: 256,
          faceScoreThreshold: 0.48,
          maxFaces: 8,
          maxHands: 3,
          compactLabels: false
        };
      }

      function resizeCanvasToVideo() {
        const w = video.videoWidth || 640;
        const h = video.videoHeight || 480;
        canvas.width = w;
        canvas.height = h;
      }

      function bestEmotion(expressions = {}) {
        let best = "neutral";
        let score = -1;
        for (const [emotion, value] of Object.entries(expressions)) {
          if (value > score) {
            best = emotion;
            score = value;
          }
        }
        return best.charAt(0).toUpperCase() + best.slice(1);
      }

      function ageRange(age) {
        const mid = Math.max(0, Math.round(age));
        return `${Math.max(0, mid - 2)}-${mid + 2}`;
      }

      function countFingers(landmarks, handednessLabel) {
        const tipIds = [4, 8, 12, 16, 20];
        const pipIds = [3, 6, 10, 14, 18];
        let count = 0;

        const thumbTip = landmarks[tipIds[0]];
        const thumbPip = landmarks[pipIds[0]];
        const thumbExtended =
          handednessLabel === "Right"
            ? thumbTip.x < thumbPip.x - 0.02
            : thumbTip.x > thumbPip.x + 0.02;
        if (thumbExtended) count++;

        for (let i = 1; i < tipIds.length; i++) {
          if (landmarks[tipIds[i]].y < landmarks[pipIds[i]].y) {
            count++;
          }
        }
        return count;
      }

      function iou(a, b) {
        const x1 = Math.max(a.x, b.x);
        const y1 = Math.max(a.y, b.y);
        const x2 = Math.min(a.x + a.w, b.x + b.w);
        const y2 = Math.min(a.y + a.h, b.y + b.h);
        if (x2 <= x1 || y2 <= y1) return 0;
        const inter = (x2 - x1) * (y2 - y1);
        const union = a.w * a.h + b.w * b.h - inter;
        return inter / union;
      }

      function trackDetections(detections, prevTracks, nextIdRef) {
        const result = [];
        const usedPrev = new Set();

        for (const det of detections) {
          let bestIdx = -1;
          let bestIou = 0.0;
          for (let i = 0; i < prevTracks.length; i++) {
            if (usedPrev.has(i)) continue;
            const score = iou(det.box, prevTracks[i].box);
            if (score > bestIou) {
              bestIou = score;
              bestIdx = i;
            }
          }
          if (bestIdx >= 0 && bestIou > 0.15) {
            usedPrev.add(bestIdx);
            result.push({ ...prevTracks[bestIdx], ...det, id: prevTracks[bestIdx].id });
          } else {
            result.push({ ...det, id: nextIdRef.value++ });
          }
        }
        return result;
      }

      function prettyAge(age) {
        return Number.isFinite(age) ? ageRange(age) : "...";
      }

      function prettyEmotion(emotion) {
        return emotion || "...";
      }

      function drawLabel(x, y, lines, color = "#fff") {
        const pad = 6;
        const lineH = 20;
        ctx.font = "700 16px Arial";
        const width = Math.max(...lines.map((l) => ctx.measureText(l).width)) + pad * 2;
        const height = lines.length * lineH + pad * 2;
        const px = Math.max(0, x);
        const py = Math.max(0, y);
        const flippedX = canvas.width - px - width;

        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(flippedX, py, width, height);
        ctx.fillStyle = color;
        lines.forEach((line, idx) => {
          ctx.fillText(line, flippedX + pad, py + pad + 16 + idx * lineH);
        });
        ctx.restore();
      }

      function drawBox(box, stroke = "#33ff44") {
        ctx.lineWidth = 4;
        ctx.strokeStyle = stroke;
        ctx.strokeRect(box.x, box.y, box.w, box.h);
      }

      async function loadModels() {
        setStatus("Loading face models...");
        await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL);
        await faceapi.nets.ageGenderNet.loadFromUri(FACE_MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(FACE_MODEL_URL);
        setStatus("Loading hand model...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: HAND_MODEL_URL },
          numHands: perfProfile.maxHands,
          runningMode: "VIDEO"
        });
      }

      async function detectFaces(nowMs) {
        if (nowMs - lastFaceAt < perfProfile.faceIntervalMs) return cachedFaces;
        lastFaceAt = nowMs;
        const shouldRefreshAttributes = nowMs - lastFaceAttrAt >= perfProfile.faceAttrIntervalMs || faceTracks.length === 0;
        let prepared = [];

        if (shouldRefreshAttributes) {
          const detections = await faceapi
            .detectAllFaces(video, faceDetectorOptions)
            .withAgeAndGender()
            .withFaceExpressions();
          lastFaceAttrAt = nowMs;
          prepared = detections
            .sort((a, b) => (b.detection.score || 0) - (a.detection.score || 0))
            .slice(0, maxFaces)
            .map((d) => ({
              box: {
                x: d.detection.box.x,
                y: d.detection.box.y,
                w: d.detection.box.width,
                h: d.detection.box.height
              },
              age: d.age,
              emotion: bestEmotion(d.expressions)
            }));
        } else {
          const detections = await faceapi.detectAllFaces(video, faceDetectorOptions);
          prepared = detections
            .sort((a, b) => (b.score || 0) - (a.score || 0))
            .slice(0, maxFaces)
            .map((d) => ({
              box: {
                x: d.box.x,
                y: d.box.y,
                w: d.box.width,
                h: d.box.height
              }
            }));
        }

        faceTracks = trackDetections(prepared, faceTracks, {
          get value() {
            return nextFaceId;
          },
          set value(v) {
            nextFaceId = v;
          }
        });
        cachedFaces = faceTracks;
        return cachedFaces;
      }

      async function detectHands(nowMs) {
        if (!handLandmarker) return [];
        if (nowMs - lastHandAt < perfProfile.handIntervalMs) return cachedHands;
        lastHandAt = nowMs;
        const res = handLandmarker.detectForVideo(video, nowMs);
        if (!res.landmarks?.length) {
          handTracks = [];
          cachedHands = [];
          return cachedHands;
        }
        const prepared = res.landmarks.slice(0, perfProfile.maxHands).map((landmarks, idx) => {
          const xs = landmarks.map((p) => p.x * canvas.width);
          const ys = landmarks.map((p) => p.y * canvas.height);
          const minX = Math.max(0, Math.min(...xs));
          const maxX = Math.min(canvas.width, Math.max(...xs));
          const minY = Math.max(0, Math.min(...ys));
          const maxY = Math.min(canvas.height, Math.max(...ys));
          const handedness = res.handednesses?.[idx]?.[0]?.categoryName || "Unknown";
          return {
            box: { x: minX, y: minY, w: maxX - minX, h: maxY - minY },
            fingers: countFingers(landmarks, handedness),
            handedness
          };
        });
        handTracks = trackDetections(prepared, handTracks, {
          get value() {
            return nextHandId;
          },
          set value(v) {
            nextHandId = v;
          }
        });
        cachedHands = handTracks;
        return cachedHands;
      }

      function drawScene(faces, hands) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const face of faces) {
          drawBox(face.box, "#33ff44");
          drawLabel(
            face.box.x,
            face.box.y + face.box.h + 6,
            perfProfile.compactLabels
              ? [`Age: ${prettyAge(face.age)}`, `Mood: ${prettyEmotion(face.emotion)}`]
              : [`Face #${face.id}`, `Age: ${prettyAge(face.age)}`, `Mood: ${prettyEmotion(face.emotion)}`],
            "#ffffff"
          );
        }

        for (const hand of hands) {
          drawBox(hand.box, "#33ff44");
          drawLabel(
            hand.box.x,
            Math.max(0, hand.box.y - 70),
            perfProfile.compactLabels
              ? [`Fingers: ${hand.fingers}`]
              : [`Hand #${hand.id}`, `${hand.handedness}`, `Fingers: ${hand.fingers}`],
            "#ffffff"
          );
        }
      }

      function kickInference(now) {
        if (!faceInferenceRunning && now - lastFaceAt >= perfProfile.faceIntervalMs) {
          faceInferenceRunning = true;
          detectFaces(now)
            .catch((err) => console.error("Face inference failed:", err))
            .finally(() => {
              faceInferenceRunning = false;
            });
        }

        if (!handInferenceRunning && now - lastHandAt >= perfProfile.handIntervalMs) {
          handInferenceRunning = true;
          detectHands(now)
            .catch((err) => console.error("Hand inference failed:", err))
            .finally(() => {
              handInferenceRunning = false;
            });
        }
      }

      function renderLoop() {
        if (!processing || !videoReady) return;
        const now = performance.now();
        kickInference(now);
        drawScene(cachedFaces, cachedHands);
        rafId = requestAnimationFrame(renderLoop);
      }

      async function start() {
        try {
          perfProfile = buildPerformanceProfile();
          maxFaces = perfProfile.maxFaces;
          faceDetectorOptions = new faceapi.TinyFaceDetectorOptions({
            inputSize: perfProfile.faceInputSize,
            scoreThreshold: perfProfile.faceScoreThreshold
          });
          setStatus("Requesting camera...");
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: perfProfile.cameraWidth },
              height: { ideal: perfProfile.cameraHeight },
              frameRate: { ideal: perfProfile.cameraFps, max: perfProfile.cameraFps }
            },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          resizeCanvasToVideo();
          videoReady = true;
          await loadModels();
          setStatus(`Running full-FPS preview (${perfProfile.name}); age/mood updates are decoupled for smoothness.`);
          processing = true;
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(renderLoop);
        } catch (err) {
          console.error(err);
          setStatus("Camera/model init failed. Ensure HTTPS and camera permission.");
        }
      }

      window.addEventListener("resize", resizeCanvasToVideo);
      document.getElementById("startBtn").addEventListener("click", start);
      document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreenPreview);
      document.addEventListener("fullscreenchange", updateFullscreenButtonLabel);
      document.addEventListener("webkitfullscreenchange", updateFullscreenButtonLabel);
      updateFullscreenButtonLabel();
    </script>
  </head>
  <body>
    <main class="app">
      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="startBtn" type="button">Start Camera</button>
          <button id="fullscreenBtn" type="button">Fullscreen</button>
        </div>
        <div id="status" class="status">Tap Start Camera</div>
      </div>
      <section id="previewStage" class="stage">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay"></canvas>
      </section>
    </main>
  </body>
</html>

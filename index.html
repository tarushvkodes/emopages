<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Face + Hand Tracker</title>
    <style>
      :root {
        --bg: #050505;
        --fg: #ffffff;
        --box: #33ff44;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: Arial, Helvetica, sans-serif;
        display: grid;
        place-items: center;
      }

      .app {
        width: min(100vw, 980px);
        padding: 12px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .status {
        font-size: 0.95rem;
        opacity: 0.9;
      }

      button {
        border: 0;
        background: #111;
        color: #fff;
        border: 1px solid #444;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
      }

      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
      }

      video,
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      video {
        transform: scaleX(-1);
      }

      canvas {
        transform: scaleX(-1);
      }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script type="module">
      import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

      const statusEl = () => document.getElementById("status");
      const video = document.getElementById("webcam");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const FACE_MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/";
      const HAND_MODEL_URL =
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";

      let handLandmarker = null;
      let videoReady = false;
      let processing = false;
      let rafId = null;
      let faceTracks = [];
      let handTracks = [];
      let nextFaceId = 1;
      let nextHandId = 1;
      let lastFaceAt = 0;
      let lastHandAt = 0;
      let cachedFaces = [];
      let cachedHands = [];

      function setStatus(msg) {
        statusEl().textContent = msg;
      }

      function resizeCanvasToVideo() {
        const w = video.videoWidth || 640;
        const h = video.videoHeight || 480;
        canvas.width = w;
        canvas.height = h;
      }

      function bestEmotion(expressions = {}) {
        let best = "neutral";
        let score = -1;
        for (const [emotion, value] of Object.entries(expressions)) {
          if (value > score) {
            best = emotion;
            score = value;
          }
        }
        return best.charAt(0).toUpperCase() + best.slice(1);
      }

      function ageRange(age) {
        const mid = Math.max(0, Math.round(age));
        return `${Math.max(0, mid - 2)}-${mid + 2}`;
      }

      function countFingers(landmarks, handednessLabel) {
        const tipIds = [4, 8, 12, 16, 20];
        const pipIds = [3, 6, 10, 14, 18];
        let count = 0;

        const thumbTip = landmarks[tipIds[0]];
        const thumbPip = landmarks[pipIds[0]];
        const thumbExtended =
          handednessLabel === "Right"
            ? thumbTip.x < thumbPip.x - 0.02
            : thumbTip.x > thumbPip.x + 0.02;
        if (thumbExtended) count++;

        for (let i = 1; i < tipIds.length; i++) {
          if (landmarks[tipIds[i]].y < landmarks[pipIds[i]].y) {
            count++;
          }
        }
        return count;
      }

      function iou(a, b) {
        const x1 = Math.max(a.x, b.x);
        const y1 = Math.max(a.y, b.y);
        const x2 = Math.min(a.x + a.w, b.x + b.w);
        const y2 = Math.min(a.y + a.h, b.y + b.h);
        if (x2 <= x1 || y2 <= y1) return 0;
        const inter = (x2 - x1) * (y2 - y1);
        const union = a.w * a.h + b.w * b.h - inter;
        return inter / union;
      }

      function trackDetections(detections, prevTracks, nextIdRef) {
        const result = [];
        const usedPrev = new Set();

        for (const det of detections) {
          let bestIdx = -1;
          let bestIou = 0.0;
          for (let i = 0; i < prevTracks.length; i++) {
            if (usedPrev.has(i)) continue;
            const score = iou(det.box, prevTracks[i].box);
            if (score > bestIou) {
              bestIou = score;
              bestIdx = i;
            }
          }
          if (bestIdx >= 0 && bestIou > 0.15) {
            usedPrev.add(bestIdx);
            result.push({ ...det, id: prevTracks[bestIdx].id });
          } else {
            result.push({ ...det, id: nextIdRef.value++ });
          }
        }
        return result;
      }

      function drawLabel(x, y, lines, color = "#fff") {
        const pad = 6;
        const lineH = 20;
        ctx.font = "700 16px Arial";
        const width = Math.max(...lines.map((l) => ctx.measureText(l).width)) + pad * 2;
        const height = lines.length * lineH + pad * 2;
        const px = Math.max(0, x);
        const py = Math.max(0, y);

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(px, py, width, height);
        ctx.fillStyle = color;
        lines.forEach((line, idx) => {
          ctx.fillText(line, px + pad, py + pad + 16 + idx * lineH);
        });
      }

      function drawBox(box, stroke = "#33ff44") {
        ctx.lineWidth = 4;
        ctx.strokeStyle = stroke;
        ctx.strokeRect(box.x, box.y, box.w, box.h);
      }

      async function loadModels() {
        setStatus("Loading face models...");
        await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL);
        await faceapi.nets.ageGenderNet.loadFromUri(FACE_MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(FACE_MODEL_URL);
        setStatus("Loading hand model...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: HAND_MODEL_URL },
          numHands: 2,
          runningMode: "VIDEO"
        });
      }

      async function detectFaces(nowMs) {
        if (nowMs - lastFaceAt < 180) return cachedFaces;
        lastFaceAt = nowMs;
        const detections = await faceapi
          .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.45 }))
          .withAgeAndGender()
          .withFaceExpressions();

        const prepared = detections.map((d) => ({
          box: {
            x: d.detection.box.x,
            y: d.detection.box.y,
            w: d.detection.box.width,
            h: d.detection.box.height
          },
          age: d.age,
          emotion: bestEmotion(d.expressions)
        }));
        faceTracks = trackDetections(prepared, faceTracks, { get value() { return nextFaceId; }, set value(v) { nextFaceId = v; } });
        cachedFaces = faceTracks;
        return cachedFaces;
      }

      async function detectHands(nowMs) {
        if (!handLandmarker) return [];
        if (nowMs - lastHandAt < 90) return cachedHands;
        lastHandAt = nowMs;
        const res = handLandmarker.detectForVideo(video, nowMs);
        if (!res.landmarks?.length) {
          handTracks = [];
          cachedHands = [];
          return cachedHands;
        }
        const prepared = res.landmarks.map((landmarks, idx) => {
          const xs = landmarks.map((p) => p.x * canvas.width);
          const ys = landmarks.map((p) => p.y * canvas.height);
          const minX = Math.max(0, Math.min(...xs));
          const maxX = Math.min(canvas.width, Math.max(...xs));
          const minY = Math.max(0, Math.min(...ys));
          const maxY = Math.min(canvas.height, Math.max(...ys));
          const handedness = res.handednesses?.[idx]?.[0]?.categoryName || "Unknown";
          return {
            box: { x: minX, y: minY, w: maxX - minX, h: maxY - minY },
            fingers: countFingers(landmarks, handedness),
            handedness
          };
        });
        handTracks = trackDetections(prepared, handTracks, { get value() { return nextHandId; }, set value(v) { nextHandId = v; } });
        cachedHands = handTracks;
        return cachedHands;
      }

      function drawScene(faces, hands) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const face of faces) {
          drawBox(face.box, "#33ff44");
          drawLabel(
            face.box.x,
            face.box.y + face.box.h + 6,
            [`Face #${face.id}`, `Age: ${ageRange(face.age)}`, `Mood: ${face.emotion}`],
            "#ffffff"
          );
        }

        for (const hand of hands) {
          drawBox(hand.box, "#33ff44");
          drawLabel(
            hand.box.x,
            Math.max(0, hand.box.y - 70),
            [`Hand #${hand.id}`, `${hand.handedness}`, `Fingers: ${hand.fingers}`],
            "#ffffff"
          );
        }
      }

      async function renderLoop() {
        if (!processing || !videoReady) return;
        const now = performance.now();
        const faces = await detectFaces(now);
        const hands = await detectHands(now);
        drawScene(faces, hands);
        rafId = requestAnimationFrame(renderLoop);
      }

      async function start() {
        try {
          setStatus("Requesting camera...");
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          resizeCanvasToVideo();
          videoReady = true;
          await loadModels();
          setStatus("Running detection...");
          processing = true;
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(renderLoop);
        } catch (err) {
          console.error(err);
          setStatus("Camera/model init failed. Ensure HTTPS and camera permission.");
        }
      }

      window.addEventListener("resize", resizeCanvasToVideo);
      document.getElementById("startBtn").addEventListener("click", start);
    </script>
  </head>
  <body>
    <main class="app">
      <div class="toolbar">
        <button id="startBtn" type="button">Start Camera</button>
        <div id="status" class="status">Tap Start Camera</div>
      </div>
      <section class="stage">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay"></canvas>
      </section>
    </main>
  </body>
</html>
